<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, intitial-scale=1.0">
        <title>ClientFlow - New Enquiry</title>
        <!-- Bootstrap 5 CSS from a CDN -->
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">ClientFlow</span>
        </div>
    </nav>
    
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card-body p-4">
                    <h2 class="card-title mb-3">New Enquiry</h2>
                    <p class="text muted mb-4">Fill in your details below and we'll get back to you within 24 hrs.

                    </p>

                    <form method="POST" action="/submit">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="phone" name="phone" required>
                        </div>
                        <div class="mb-3">
                            <label for="service" class="form-label">Service Needed</label>
                            <select class="form-select" id="service" name="service" required>
                                <option value="">Select a service...</option>
                                <option value="financial_planning">Financial Planning</option>
                                <option value="investment_advice">Investment Advice</option>
                                <option value="insaurance">Insuarace</option>
                                <option value="tax_planning">Tax Planning</option>
                                <option value="other">Other</option>
                            </select>

                        </div>
                        <div class="mb-4">
                            <label for="notes" class="form-label">Notes <span class="text-muted">(Optional)</span></label>
                            <textarea class="form-control" id="notes" name="notes" rows="4" placeholder="Anything else we shoul know?"></textarea>

                        </div>
                        <button type="submit" class="btn btn-primary w-100">Submit Enquiry</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    </body>
</html>
